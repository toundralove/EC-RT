<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EC@RT — Zone 02</title>
  <link rel="stylesheet" href="zone_02.css" />
  <style>
    .unity-wrapper {
      position: relative;
      width: 100%;
      max-width: 1100px;
      aspect-ratio: 16 / 9;
      margin: 0 auto;
      background: #111;
      overflow: hidden;
    }

    #unity-container {
      width: 100%;
      height: 100%;
      position: relative;
      background: #111;
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
      background: #111;
    }

    #unity-loading-bar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 240px;
      text-align: center;
      color: white;
      font-family: Arial, sans-serif;
      z-index: 10;
    }

    #unity-progress-bar-empty {
      width: 100%;
      height: 12px;
      border: 1px solid white;
      margin-top: 10px;
    }

    #unity-progress-bar-full {
      width: 0%;
      height: 100%;
      background: white;
    }

    #unity-warning {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: red;
      color: white;
      padding: 12px 16px;
      font-family: Arial, sans-serif;
      font-size: 14px;
      z-index: 20;
      max-width: 80%;
    }
  </style>
</head>
<body>
  <div class="page-layout">
    <aside class="sidebar">
      <a href="../index.html" class="site-title">EC@RT</a>
      <nav class="zone-nav">

        <a href="zone-03.html">03. Zone 03</a>
        <a href="zone-04.html">04. Zone 04</a>
        <a href="zone-05.html">05. Zone 05</a>
        <a href="zone-06.html">06. Zone 06</a>
        <a href="zone-07.html">07. Zone 07</a>
        <a href="zone-08.html">08. Zone 08</a>
        <a href="zone-09.html">09. Zone 09</a>
        <a href="zone-10.html">10. Zone 10</a>
        <a href="zone-11.html">11. Zone 11</a>
        <a href="zone-12.html">12. 491</a>
        <a href="zone-13.html">13. Search and Destroy</a>
      </nav>
    </aside>

    <main class="main-content">
      <section class="zone-content">
        <div class="unity-wrapper">
          <div id="unity-container">
            <canvas id="unity-canvas"></canvas>

            <div id="unity-loading-bar">
              <div>Chargement...</div>
              <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
              </div>
            </div>

            <div id="unity-warning" style="display:none;"></div>
          </div>
        </div>

        <div class="zone-text">
          <p>Zone 02</p>
          <h1>Zone 02</h1>
          <p>Scène Unity WebGL intégrée dans EC@RT.</p>
        </div>
      </section>
    </main>
  </div>
</body>
